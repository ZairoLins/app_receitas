name: receitas_app
description: Aplicativo de Receitas Rápidas do Dia a Dia - Trabalho A1

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Persistência local com banco de dados SQLite
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0

  # Utilitário para encontrar o caminho correto do banco no dispositivo
  path_provider: ^2.1.2
  path: ^1.9.0

  # Carrossel de imagens na tela inicial
  carousel_slider: ^5.0.0

  # Indicadores de página (bolinhas) para o carrossel
  smooth_page_indicator: ^1.1.0

  # Seleção de imagem da galeria ou câmera
  image_picker: ^1.0.7

  # Gerador de IDs únicos para cada receita
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
